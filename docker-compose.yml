services:
  portfolio:
    image: ghcr.io/prinako/portfolio:main
    container_name: deno-portfolio
    environment:
      PORT: 8000
    ports:
      - "${PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "deno",
          "eval",
          "--allow-net=localhost:8000",
          "const response = await fetch('http://localhost:8000/health'); if (!response.ok) Deno.exit(1);",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
